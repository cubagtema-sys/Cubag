  # 2. Flutter Web Frontend Static Site
  - type: web
    env: static
    name: cubag-web-app
    buildCommand: "cd cubag_flutter && git clone https://github.com/flutter/flutter.git -b stable && export PATH=\"$PATH:$(pwd)/flutter/bin\" && flutter build web --release"
    staticPublishPath: cubag_flutter/build/web
    routes:
      # Redirect all 404s to index.html for Flutter Web's routing to work
      - type: rewrite
        source: /*
        destination: /index.html
